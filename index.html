<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>The Legend of Zelda: Ocarina of Time</title>
    <script>
      window.gameconfig = {
        name: "Legend of Zelda, The - Ocarina of Time (USA)",
        url: "Legend of Zelda, The - Ocarina of Time (U) (V1.2) [!].z64",
        core: "n64",
        min: 1,
        max: 2,
      };
    </script>
    <script>
      function mergeFiles(fileParts, cb) {
        return new Promise((resolve, reject) => {
          let buffers = [];
          function fetchPart(index) {
            if (index >= fileParts.length) {
              let mergedBlob = new Blob(buffers);
              let mergedFileUrl = URL.createObjectURL(mergedBlob);
              resolve(mergedFileUrl);
              return;
            }
            
            if (typeof cb === 'function') cb(index + 1);

            fetch(fileParts[index])
              .then((response) => {
                if (!response.ok) throw new Error(`Chunk ${index + 1} failed to load.`);
                return response.arrayBuffer();
              })
              .then((data) => {
                buffers.push(data);
                fetchPart(index + 1);
              })
              .catch(reject);
          }
          fetchPart(0);
        });
      }

      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) {
          parts.push(file + ".part" + i);
        }
        return parts;
      }
    </script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: #121212;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      #game-container {
        text-align: center;
        width: 100%;
        height: 100%;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      #loading-progress {
        font-size: 18px;
        margin-top: 20px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="game"></div>
      <div id="loading-progress">Loading: 0/2</div>
      <div id="first-time"><br>First-time loading may take longer...</div>
    </div>
    <script>
      var parts = getParts(
        window.gameconfig.url,
        window.gameconfig.min,
        window.gameconfig.max
      );
      var totalParts = parts.length;

      function updateLoadingProgress(loaded) {
        const progressElement = document.getElementById("loading-progress");
        if (progressElement) {
          progressElement.textContent = `Loading: ${loaded}/${totalParts}`;
        }
      }

      mergeFiles(parts, updateLoadingProgress)
        .then((gameUrl) => {
          if (document.getElementById("loading-progress")) document.getElementById("loading-progress").remove();
          if (document.getElementById("first-time")) document.getElementById("first-time").remove();
          
          EJS_player = "#game";
          EJS_core = window.gameconfig.core;
          EJS_gameName = window.gameconfig.name;
          EJS_color = "#0064ff";
          EJS_startOnLoaded = true;
          EJS_gameUrl = gameUrl;
          EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/"; 
          
          const script = document.createElement("script");
          script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
          document.body.appendChild(script);
        })
        .catch((error) => {
          console.error(error);
          const progressElement = document.getElementById("loading-progress");
          if (progressElement) progressElement.textContent = "Error loading game data.";
        });
    </script>
  </body>
</html>
