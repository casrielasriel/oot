<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>The Legend of Zelda: Ocarina of Time</title>
    <script>
      window.gameconfig = {
        name: "Legend of Zelda, The - Ocarina of Time (USA)",
        url: "Legend of Zelda, The - Ocarina of Time (U) (V1.2) [!].z64",
        core: "n64",
      };
    </script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        background-color: #121212;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      #game-container {
        text-align: center;
        width: 100%;
        height: 100%;
      }
      #game {
        width: 100%;
        height: 100%;
      }
      #loading-text {
        font-size: 18px;
        margin-top: 20px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="game"></div>
      <div id="loading-text">Loading game engine...</div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (document.getElementById("loading-text")) document.getElementById("loading-text").remove();
        
        EJS_player = "#game";
        EJS_core = window.gameconfig.core;
        EJS_gameName = window.gameconfig.name;
        EJS_color = "#0064ff";
        EJS_startOnLoaded = true;
        EJS_gameUrl = window.gameconfig.url;
        
        
        EJS_pathtodata = "https://casrielasriel.github.io/oot/data/"; 
        
        const script = document.createElement("script");
        script.src = "https://casrielasriel.github.io/oot/data/loader.js";
        document.body.appendChild(script);
      });
    </script>
  </body>
</html>
